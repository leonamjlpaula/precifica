name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  checks:
    name: Lint, Format & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        # postinstall roda `prisma generate` — funciona sem DATABASE_URL no Prisma 6

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck
